# Smithery configuration file: https://smithery.ai/docs/config#smitheryyaml
startCommand:
  type: stdio
  configSchema:
    type: object
    properties:
      PAPER_SEARCH_MCP_CORE_API_KEY:
        type: string
        description: "Free API key for CORE (recommended)"
      PAPER_SEARCH_MCP_SEMANTIC_SCHOLAR_API_KEY:
        type: string
        description: "API key for Semantic Scholar (optional, improves rate limits)"
      PAPER_SEARCH_MCP_DOAJ_API_KEY:
        type: string
        description: "API key for DOAJ (optional)"
      PAPER_SEARCH_MCP_OPENALEX_API_KEY:
        type: string
        description: "API key for OpenAlex"
      PAPER_SEARCH_MCP_CROSSREF_MAILTO:
        type: string
        description: "Contact email for the Crossref polite pool"
  commandFunction: |-
    (config) => {
      const env = {};
      if (config.PAPER_SEARCH_MCP_CORE_API_KEY) env.PAPER_SEARCH_MCP_CORE_API_KEY = config.PAPER_SEARCH_MCP_CORE_API_KEY;
      if (config.PAPER_SEARCH_MCP_SEMANTIC_SCHOLAR_API_KEY) env.PAPER_SEARCH_MCP_SEMANTIC_SCHOLAR_API_KEY = config.PAPER_SEARCH_MCP_SEMANTIC_SCHOLAR_API_KEY;
      if (config.PAPER_SEARCH_MCP_DOAJ_API_KEY) env.PAPER_SEARCH_MCP_DOAJ_API_KEY = config.PAPER_SEARCH_MCP_DOAJ_API_KEY;
      if (config.PAPER_SEARCH_MCP_OPENALEX_API_KEY) env.PAPER_SEARCH_MCP_OPENALEX_API_KEY = config.PAPER_SEARCH_MCP_OPENALEX_API_KEY;
      if (config.PAPER_SEARCH_MCP_CROSSREF_MAILTO) env.PAPER_SEARCH_MCP_CROSSREF_MAILTO = config.PAPER_SEARCH_MCP_CROSSREF_MAILTO;
      return { command: 'paper-search-mcp', env };
    }
  exampleConfig:
    PAPER_SEARCH_MCP_CORE_API_KEY: ""
    PAPER_SEARCH_MCP_OPENALEX_API_KEY: ""
    PAPER_SEARCH_MCP_CROSSREF_MAILTO: ""
